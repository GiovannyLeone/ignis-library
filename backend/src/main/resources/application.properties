# =============================================
# SISTEMA DE GERENCIAMENTO DE BIBLIOTECA - IGNIS
# PapiroTech | Versão 6.0
# =============================================

server.port=8080
spring.application.name=biblioteca-ignis

# DATABASE — credenciais via variável de ambiente
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA — none: o script SQL controla o schema
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# =============================================
# SQL INIT — executa ignis_library.sql na inicialização
# O script usa CREATE TABLE IF NOT EXISTS e INSERT IGNORE,
# portanto é seguro rodar a cada boot sem apagar dados.
# =============================================
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:db/ignis_library.sql
spring.sql.init.encoding=UTF-8

# Garante que o SQL init roda ANTES do Hibernate e do DataSeeder
spring.jpa.defer-datasource-initialization=true

# JWT — via variável de ambiente
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# LOGGING
logging.level.com.papirotech=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.jdbc=INFO

# SWAGGER
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
