# =============================================
# SISTEMA DE GERENCIAMENTO DE BIBLIOTECA - IGNIS
# PapiroTech | Versão 1.0.0
# =============================================

# Server
server.port=8080
spring.application.name=biblioteca-ignis

# =============================================
# DATABASE - MySQL
# =============================================
spring.datasource.url=jdbc:mysql://localhost:3306/biblioteca_ignis?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# =============================================
# JPA — ddl-auto NONE pois o Flyway controla o schema
# =============================================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# =============================================
# FLYWAY — gerenciamento de migrations
# O Flyway verifica a tabela flyway_schema_history antes de rodar.
# Scripts já executados NUNCA são executados novamente.
# =============================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# =============================================
# SECURITY - JWT
# =============================================
app.jwt.secret=BibliotecaIgnisPapiroTechSecretKey2024SuperSeguraBase64EncodedMinimo256Bits
app.jwt.expiration=86400000

# =============================================
# LOGGING
# =============================================
logging.level.com.papirotech=INFO
logging.level.org.springframework.security=WARN
logging.level.org.flywaydb=INFO

# =============================================
# SPRINGDOC / SWAGGER
# =============================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
