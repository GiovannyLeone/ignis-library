# =============================================
# SISTEMA DE GERENCIAMENTO DE BIBLIOTECA - IGNIS
# PapiroTech | Versão 6.0
# =============================================

server.port=8080
spring.application.name=biblioteca-ignis

# =============================================
# DATABASE — credenciais via variável de ambiente
# =============================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================================
# JPA — update: Hibernate cria/atualiza tabelas que ainda não existem
# e não toca nas que já existem corretamente.
# O DataSeeder cuida dos dados base com verificações de existência.
# =============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# =============================================
# SECURITY — JWT via variável de ambiente
# =============================================
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# =============================================
# LOGGING
# =============================================
logging.level.com.papirotech=INFO
logging.level.org.springframework.security=WARN

# =============================================
# SPRINGDOC / SWAGGER
# =============================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
